<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LectureForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:     #0e0d0b;
    --paper:   #f5f0e8;
    --cream:   #ede7d9;
    --rule:    #c8bfae;
    --accent:  #c0392b;
    --accent2: #e67e22;
    --muted:   #7a7060;
    --success: #2d6a4f;
    --mono:    'DM Mono', monospace;
    --serif:   'Playfair Display', Georgia, serif;
    --sans:    'DM Sans', sans-serif;
  }

  html, body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: .5;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 64px 32px 120px;
  }

  /* ── Masthead ── */
  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 24px;
    margin-bottom: 56px;
    display: flex;
    align-items: baseline;
    gap: 20px;
  }
  .logo {
    font-family: var(--serif);
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: -1px;
    line-height: 1;
  }
  .logo span { color: var(--accent); }
  .tagline {
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    padding-top: 4px;
  }
  .issue {
    margin-left: auto;
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  /* ── Form card ── */
  .card {
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 40px 44px;
    position: relative;
    box-shadow: 4px 4px 0 var(--rule);
  }
  .card::before {
    content: 'INPUT';
    position: absolute;
    top: -10px; left: 28px;
    background: var(--cream);
    padding: 0 8px;
    font-family: var(--mono);
    font-size: .62rem;
    letter-spacing: .2em;
    color: var(--muted);
  }

  label {
    display: block;
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 13px 16px;
    font-family: var(--mono);
    font-size: .9rem;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 1px;
    color: var(--ink);
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--rule); }

  .field { margin-bottom: 28px; }

  /* ── Toggle ── */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }
  .toggle {
    position: relative;
    width: 44px; height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--rule);
    border-radius: 24px;
    cursor: pointer;
    transition: background .25s;
  }
  .slider::before {
    content: '';
    position: absolute;
    left: 3px; top: 3px;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform .25s;
  }
  .toggle input:checked + .slider { background: var(--success); }
  .toggle input:checked + .slider::before { transform: translateX(20px); }
  .toggle-label { font-family: var(--sans); font-size: .88rem; color: var(--ink); }

  /* ── Submit button ── */
  .btn-generate {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .04em;
    border: none;
    border-radius: 1px;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn-generate:hover { background: #1e1c18; }
  .btn-generate:active { transform: scale(.99); }
  .btn-generate:disabled { background: var(--rule); cursor: not-allowed; }

  /* ── Progress ── */
  #progress-section {
    margin-top: 48px;
    display: none;
    animation: fadeUp .4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .status-text { font-family: var(--mono); font-size: .8rem; color: var(--muted); }
  .status-pct  { font-family: var(--mono); font-size: .8rem; color: var(--accent); }

  .progress-track {
    height: 3px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width .6s cubic-bezier(.4, 0, .2, 1);
    border-radius: 2px;
  }

  /* ── Result ── */
  #result-section {
    display: none;
    animation: fadeUp .4s ease both;
  }
  .result-card {
    border: 1px solid var(--rule);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 4px 4px 0 var(--rule);
  }
  .result-header {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .result-header .check { font-size: 1.1rem; color: #6ee7a0; }
  .result-header h3 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: .02em;
  }
  .result-body { background: var(--cream); padding: 28px; }

  .download-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .dl-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 20px 12px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .2s, transform .15s, box-shadow .15s;
  }
  .dl-btn:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
  }
  .dl-btn:disabled { opacity: .38; cursor: not-allowed; transform: none; box-shadow: none; }
  .dl-btn .icon { font-size: 1.6rem; }
  .dl-btn .ext  { font-size: .65rem; color: var(--accent); font-weight: 500; }

  /* ── Error ── */
  .error-banner {
    background: #fdf0ee;
    border: 1px solid #e8c2bc;
    border-left: 4px solid var(--accent);
    border-radius: 2px;
    padding: 18px 20px;
    font-family: var(--mono);
    font-size: .82rem;
    color: #7a2e26;
    margin-top: 32px;
    display: none;
    animation: fadeUp .3s ease both;
  }

  /* ── Footer ── */
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  footer p {
    font-family: var(--mono);
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--rule);
  }

  @media (max-width: 600px) {
    .page   { padding: 40px 20px 80px; }
    .card   { padding: 28px 22px; }
    .download-grid { grid-template-columns: 1fr 1fr; }
    header  { flex-wrap: wrap; gap: 8px; }
    .issue  { margin-left: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- ── Masthead ── -->
  <header>
    <div>
      <div class="logo">Lecture<span>Forge</span></div>
      <div class="tagline">YouTube &rarr; LaTeX &amp; PDF Notes</div>
    </div>
    <div class="issue" id="date-stamp"></div>
  </header>

  <!-- ── Input card ── -->
  <div class="card">
    <div class="field">
      <label for="url">YouTube URL</label>
      <input type="text" id="url"
             placeholder="https://www.youtube.com/watch?v=…"
             autocomplete="off" spellcheck="false" />
    </div>

    <div class="field">
      <label for="api-key">API Key</label>
      <input type="password" id="api-key" placeholder="sk-…" autocomplete="off" />
    </div>

    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="gen-pdf" checked />
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Compile PDF from LaTeX</span>
    </div>

    <button class="btn-generate" id="btn-go" onclick="startJob()">
      Generate Notes
    </button>
  </div>

  <!-- ── Progress ── -->
  <div id="progress-section">
    <div class="status-label">
      <span class="status-text" id="status-msg">Initialising…</span>
      <span class="status-pct"  id="status-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- ── Result ── -->
  <div id="result-section">
    <div class="result-card">
      <div class="result-header">
        <span class="check">✓</span>
        <h3>Notes Generated Successfully</h3>
      </div>
      <div class="result-body">
        <div class="download-grid">
          <button class="dl-btn" id="dl-transcript" onclick="dl('transcript')">
            <span class="icon">📄</span>
            <span>Transcript</span>
            <span class="ext">.txt</span>
          </button>
          <button class="dl-btn" id="dl-latex" onclick="dl('latex')">
            <span class="icon">📐</span>
            <span>LaTeX Source</span>
            <span class="ext">.tex</span>
          </button>
          <button class="dl-btn" id="dl-pdf" onclick="dl('pdf')">
            <span class="icon">📑</span>
            <span>PDF Notes</span>
            <span class="ext">.pdf</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Error ── -->
  <div class="error-banner" id="error-banner"></div>

  <!-- ── Footer ── -->
  <footer>
    <p>LectureForge &mdash; Academic Note Generator</p>
    <p>Powered by Flask + AI</p>
  </footer>

</div><!-- /.page -->

<script>
  // ── Masthead date ──────────────────────────────────────────────────────────
  const d = new Date();
  document.getElementById('date-stamp').innerHTML =
    `Vol. I &mdash; No.&nbsp;${d.getDate()}<br>` +
    d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  // ── State ──────────────────────────────────────────────────────────────────
  let currentJobId = null;
  let pollTimer    = null;

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setUI(state) {
    const btn    = document.getElementById('btn-go');
    const prog   = document.getElementById('progress-section');
    const result = document.getElementById('result-section');
    const err    = document.getElementById('error-banner');

    const show = el => el.style.display = 'block';
    const hide = el => el.style.display = 'none';

    switch (state) {
      case 'idle':
        btn.disabled = false;
        btn.textContent = 'Generate Notes';
        hide(prog); hide(result); hide(err);
        break;
      case 'running':
        btn.disabled = true;
        btn.textContent = 'Working…';
        show(prog); hide(result); hide(err);
        break;
      case 'done':
        btn.disabled = false;
        btn.textContent = 'Generate Again';
        show(prog); show(result); hide(err);
        break;
      case 'error':
        btn.disabled = false;
        btn.textContent = 'Try Again';
        hide(prog); hide(result);
        break;
    }
  }

  function updateProgress(pct, msg) {
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('status-pct').textContent   = pct + '%';
    document.getElementById('status-msg').textContent   = msg;
  }

  function showError(msg) {
    setUI('error');
    const el = document.getElementById('error-banner');
    el.textContent   = '⚠ ' + msg;
    el.style.display = 'block';
  }

  // ── Job lifecycle ──────────────────────────────────────────────────────────
  async function startJob() {
    const url    = document.getElementById('url').value.trim();
    const apiKey = document.getElementById('api-key').value.trim();
    const genPdf = document.getElementById('gen-pdf').checked;

    if (!url || !apiKey) {
      showError('Please enter both a YouTube URL and an API key.');
      return;
    }

    clearInterval(pollTimer);
    setUI('running');
    updateProgress(0, 'Sending request…');

    try {
      const res  = await fetch('/api/generate', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ url, api_key: apiKey, generate_pdf: genPdf }),
      });
      const data = await res.json();
      if (data.error) { showError(data.error); return; }

      currentJobId = data.job_id;
      pollTimer    = setInterval(pollStatus, 1200);
    } catch (e) {
      showError('Network error: ' + e.message);
    }
  }

  async function pollStatus() {
    if (!currentJobId) return;
    try {
      const res  = await fetch(`/api/status/${currentJobId}`);
      const data = await res.json();
      updateProgress(data.progress, data.message || data.status);

      if (data.status === 'done') {
        clearInterval(pollTimer);
        setUI('done');
        document.getElementById('dl-pdf').disabled = !data.files.pdf;
      } else if (data.status === 'error') {
        clearInterval(pollTimer);
        showError(data.error || 'An unknown error occurred.');
      }
    } catch (_) {
      // transient network blip — keep polling
    }
  }

  // ── Downloads ──────────────────────────────────────────────────────────────
  function dl(type) {
    if (currentJobId) {
      window.location.href = `/api/download/${currentJobId}/${type}`;
    }
  }
</script>
</body>
</html>
